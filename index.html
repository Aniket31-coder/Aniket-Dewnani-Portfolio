<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = saved ? saved === "dark" : prefersDark;
          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {}
      })();
    </script>
 
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aniket Dewnani | Developer Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Aniket Dewnani, a Data Analyst as well as Front-end developer focused on React, Tailwind CSS, and modern web development"
    />
    <meta

      content="Aniket Dewnani, Data Analyst as well as Front-end developer, React developer portfolio, Tailwind CSS, web developer portfolio"
    />
    <meta name="author" content="Aniket Dewnani" />

    <link rel="canonical" href="https://aniket-dewnani-portfolio.vercel.app/" />
